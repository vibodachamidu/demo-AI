<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ᴄʜᴀᴍɪᴅᴜ ᴀɪ✦ Neural Interface</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Three.js for 3D animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 50% 50%, #1a1a2e, #0a0a0f);
      font-family: 'Space Grotesk', sans-serif;
      color: white;
      overflow-x: hidden;
      position: relative;
    }

    /* 3D Canvas Background */
    #canvas-3d {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(0, 255, 255, 0.5);
      border-radius: 50%;
      box-shadow: 0 0 20px cyan;
      animation: float 20s infinite linear;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) translateX(-10vw) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) translateX(10vw) rotate(360deg);
        opacity: 0;
      }
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .glass-card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      padding: 35px;
      box-shadow: 
        0 25px 45px rgba(0, 0, 0, 0.2),
        0 0 0 1px rgba(255, 255, 255, 0.05),
        0 0 30px rgba(0, 255, 255, 0.2);
      animation: cardFloat 6s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
      animation: rotate 20s linear infinite;
      z-index: -1;
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(0.5deg); }
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* AI Avatar */
    .ai-avatar {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, cyan, #00ff9d);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      animation: pulse 2s ease-in-out infinite, glow 3s ease-in-out infinite;
      position: relative;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
    }

    .ai-avatar::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid cyan;
      animation: ripple 2s ease-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes glow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2); }
    }

    @keyframes ripple {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(1.5);
        opacity: 0;
      }
    }

    .typing-visual {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 15px 0;
      height: 30px;
      align-items: center;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: cyan;
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out;
      box-shadow: 0 0 15px cyan;
    }

    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 2.5em;
      background: linear-gradient(135deg, #fff, cyan);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      animation: titleGlow 3s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 0 20px rgba(0, 255, 255, 0.3); }
      50% { text-shadow: 0 0 40px rgba(0, 255, 255, 0.6); }
    }

    .subtitle {
      text-align: center;
      opacity: 0.8;
      margin-bottom: 25px;
      font-size: 0.95em;
      letter-spacing: 1px;
    }

    /* Input Area */
    .input-container {
      position: relative;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 100px;
      background: rgba(0, 0, 0, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 15px;
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      resize: none;
      outline: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }

    textarea:focus {
      border-color: cyan;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
      transform: scale(1.02);
    }

    textarea::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    /* Button */
    .send-button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, cyan, #00b8ff);
      border: none;
      border-radius: 50px;
      color: #0a0a0f;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0, 255, 255, 0.4);
    }

    .send-button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .send-button:hover::before {
      width: 300px;
      height: 300px;
    }

    .send-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0, 255, 255, 0.6);
    }

    .send-button:active {
      transform: translateY(0);
    }

    .response-card {
      margin-top: 25px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      min-height: 80px;
      font-size: 15px;
      line-height: 1.6;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .response-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(135deg, cyan, transparent);
      border-radius: 20px;
      z-index: -1;
      animation: borderGlow 3s linear infinite;
      opacity: 0.5;
    }

    @keyframes borderGlow {
      0%, 100% { filter: blur(5px); }
      50% { filter: blur(10px); }
    }

    .response-content {
      position: relative;
      z-index: 1;
    }

    .ai-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .ai-indicator span {
      font-size: 12px;
      opacity: 0.7;
    }

    .ai-wave {
      display: flex;
      gap: 3px;
    }

    .ai-wave span {
      width: 3px;
      height: 15px;
      background: cyan;
      border-radius: 3px;
      animation: wave 1s infinite ease-in-out;
    }

    .ai-wave span:nth-child(2) { animation-delay: 0.2s; }
    .ai-wave span:nth-child(3) { animation-delay: 0.4s; }
    .ai-wave span:nth-child(4) { animation-delay: 0.6s; }

    @keyframes wave {
      0%, 100% { height: 15px; }
      50% { height: 25px; }
    }

    .floating-elements {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      .glass-card {
        padding: 25px;
      }
      
      h1 {
        font-size: 2em;
      }
    }
  </style>
</head>
<body>

  <canvas id="canvas-3d"></canvas>
  

  <div class="particles" id="particles"></div>
  
  
  <div class="container">
    <div class="glass-card">
    
      <div class="ai-avatar">
        🤖
      </div>
      
      <h1>ᴄʜᴀᴍɪᴅᴜ ᴀɪ</h1>
      <div class="subtitle">ɴᴇᴜʀᴀʟ ɪɴᴛᴇʀғᴀᴄᴇ ✦ v2.0</div>
      
    
      <div class="typing-visual">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
      
    
      <div class="input-container">
        <textarea id="prompt" placeholder="Sᴘᴇᴀᴋ ᴡɪᴛʜ ᴀɪ ✦..."></textarea>
      </div>
      
    
      <button class="send-button" onclick="sendPrompt()">
        ᴛʀᴀɴsᴍɪᴛ ᴍᴇssᴀɢᴇ ᴛᴏ ✦
      </button>
      
  
      <div class="response-card">
        <div class="ai-indicator">
          <div class="ai-wave">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <span>AI response</span>
        </div>
        <div class="response-content" id="response">
          Initializing neural link...
        </div>
      </div>
    </div>
  </div>

<script>

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas-3d'), alpha: true });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);

  const geometry = new THREE.IcosahedronGeometry(0.5, 0);
  const material = new THREE.MeshBasicMaterial({ 
    color: 0x00ffff,
    wireframe: true,
    transparent: true,
    opacity: 0.1
  });
  
  const objects = [];
  for (let i = 0; i < 8; i++) {
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.x = (Math.random() - 0.5) * 10;
    mesh.position.y = (Math.random() - 0.5) * 10;
    mesh.position.z = (Math.random() - 5) * 2;
    scene.add(mesh);
    objects.push(mesh);
  }

  const sphereGeo = new THREE.SphereGeometry(0.2, 8, 8);
  const sphereMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.1 });
  
  for (let i = 0; i < 12; i++) {
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    sphere.position.x = (Math.random() - 0.5) * 15;
    sphere.position.y = (Math.random() - 0.5) * 15;
    sphere.position.z = (Math.random() - 5) * 3;
    scene.add(sphere);
    objects.push(sphere);
  }

  camera.position.z = 5;

  function animate3D() {
    requestAnimationFrame(animate3D);
    objects.forEach(obj => {
      obj.rotation.x += 0.001;
      obj.rotation.y += 0.002;
    });
    renderer.render(scene, camera);
  }
  animate3D();

  function createParticles() {
    const particlesDiv = document.getElementById('particles');
    for (let i = 0; i < 50; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 20 + 's';
      particle.style.animationDuration = (15 + Math.random() * 10) + 's';
      particle.style.width = (2 + Math.random() * 6) + 'px';
      particle.style.height = particle.style.width;
      particlesDiv.appendChild(particle);
    }
  }
  createParticles();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });


  function typeText(text, element) {
    let i = 0;
    element.innerHTML = "";
    const interval = setInterval(() => {
      element.innerHTML += text[i];
      i++;
      if (i >= text.length) clearInterval(interval);
    }, 20);
  }


  async function sendPrompt() {
    const prompt = document.getElementById("prompt").value.trim();
    const responseBox = document.getElementById("response");
    const sendButton = document.querySelector('.send-button');

    if (!prompt) {
      responseBox.innerHTML = "⚠️ Please type a message...";
      return;
    }

    sendButton.style.transform = 'scale(0.95)';
    setTimeout(() => {
      sendButton.style.transform = '';
    }, 200);

    responseBox.innerHTML = `
      <div style="display: flex; gap: 8px; align-items: center;">
        <div class="typing-visual" style="margin: 0;">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
        <span style="opacity: 0.7;">Processing...</span>
      </div>
    `;

    try {
      const res = await fetch(`/api/chat?prompt=${encodeURIComponent(prompt)}`);
      const data = await res.json();

      if (data.status) {
        typeText(data.data, responseBox);
      } else {
        responseBox.innerHTML = "❌ Error: " + data.error;
      }

    } catch (err) {
      responseBox.innerHTML = "❌ Neural link failed. Retrying...";
    }
  }

  document.getElementById('prompt').addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendPrompt();
    }
  });

  setTimeout(() => {
    document.querySelector('.glass-card').style.opacity = '1';
  }, 100);
       </script>
</body>
  </html>
